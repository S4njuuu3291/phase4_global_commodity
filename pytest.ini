[pytest]
# Pytest configuration for Global Commodity Data Pipeline

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Minimum Python version
minversion = 7.0

# Verbose output
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    
# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    aws: AWS-dependent tests
    mock: Tests with mocking

# Coverage options (if using pytest-cov)
# addopts = --cov=dags --cov-report=html --cov-report=term-missing

# Timeout for tests (seconds)
timeout = 300
